name: Build, hash, sign, and upload release artifacts

on:
  push:
    branches:
      - main
      - feat/*
      - fix/*
      - perf/*

permissions:
  contents: read

jobs:
  bump:
    name: Check if the push requires a version bump
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version_bumped: ${{ steps.commit.outputs.version_bumped }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.27'

      - name: Install dependencies
        run: uv sync --group bump
      
      - name: Check if the push requires a version bump
        run: uv run python-semantic-release -c pyproject.toml version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit version bump
        id: commit
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          else
            echo "version_bumped=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: bump
    if: ${{ needs.bump.outputs.version_bumped == 'true' }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.27'

      - name: Install dependencies
        run: uv sync --group build

      - name: Build project
        run: uv run build 

      - name: Compress build artifacts
        run: |
          mkdir -p dist/
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell Compress-Archive -Path "build/justkeepswimming.dist/*" -DestinationPath "dist/justkeepswimming-${{ runner.os }}-${{ runner.arch }}.zip"
          else
            tree -d build
            tar -czf dist/justkeepswimming-${{ runner.os }}-${{ runner.arch }}.tar.gz -C build/justkeepswimming.dist .
          fi
  
      - name: Upload compressed build artifacts
        uses: actions/upload-artifact@v4
        with:
          path: dist/

  hash:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Compute hashes for all artifacts
        run: |
          shopt -s globstar
          for file in **/*.{zip,tar.gz}; do
            [ -f "$file" ] || continue
            sha256sum "$file" > "$file.sha256"
          done


      - name: Upload hashes
        uses: actions/upload-artifact@v4
        with:
          path: dist/**/*.sha256

  sign:
    needs: hash
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Import code signing private key
        env:
          CODE_SIGNING_PRIVATE_KEY: ${{ secrets.CODE_SIGNING_PRIVATE_KEY }}
        run: echo "$CODE_SIGNING_PRIVATE_KEY" | gpg --batch --import

      - name: Sign all hashes and archives
        run: |
          cd dist
          shopt -s globstar
          for file in **/*.{zip,tar.gz,sha256}; do
            [ -f "$file" ] || continue
            gpg --batch --yes --armor --output "$file.sig" --detach-sign "$file"
          done

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          path: dist/**/*.sig
          name: signatures

  release:
    needs: sign
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.27'

      - name: Install dependencies
        run: uv sync --group bump

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
      
      - name: Update lockfile
        run: uv sync --package justkeepswimming
      - name: Commit version bump
        id: commit
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          else
            echo "version_bumped=true" >> $GITHUB_OUTPUT
            git commit -m "ci: bump package version to {version} [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
      - name: Publish release
        run: uv run python-semantic-release -c pyproject.toml publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            
